# GitLab CI/CD configuration for Ruby gem
image: ruby:3.4.1

# Variables
variables:
  DEBIAN_FRONTEND: noninteractive
  BUNDLE_PATH: cache
  BUNDLE_FROZEN: "true"

# Cache gems between builds
cache: &global_cache
  paths:
    - cache
  policy: pull-push

# Define stages
stages:
  - test
  - build
  - install
  - release

# Before script - install dependencies
before_script:
  - ruby -v
  - which ruby
  - gem install bundler -v 2.7.2
  - bundle version
  - bundle install --jobs $(nproc)

# Test stage - runs both RSpec and RuboCop via rake
test:
  stage: test
  script:
    - bundle exec rake
  coverage: '/\(\d+\.\d+\%\) covered/'
  artifacts:
    paths:
      - coverage/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_REF_NAME == "main"

# Check if version is new (runs on all MRs and main branch)
check_version:
  stage: test
  script:
    - bin/check_version
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_REF_NAME == "main"


# Build gem
build_gem:
  stage: build
  cache:
    <<: *global_cache
    policy: pull
  script:
    - bundle exec rake build
  artifacts:
    paths:
      - pkg/*.gem
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_REF_NAME == "main"
    - if: $CI_COMMIT_TAG

# Test gem installation
test_gem_install:
  stage: install
  cache:
    <<: *global_cache
    policy: pull
  dependencies:
    - build_gem
  script:
    - gem install pkg/*.gem
    - ruby -e "require 'llm_conductor'; puts 'Gem loaded successfully'"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_REF_NAME == "main"
    - if: $CI_COMMIT_TAG

# Release to RubyGems (automatic on main branch merge)
release_rubygems:
  stage: release
  cache:
    <<: *global_cache
    policy: pull
  dependencies:
    - build_gem
  script:
    - |
      export GEM_VERSION=$(ruby -r ./lib/llm_conductor/version.rb -e "puts LlmConductor::VERSION")
      echo "Deploying gem version ${GEM_VERSION} to RubyGems..."
      mkdir -p ~/.gem
      echo "---" > ~/.gem/credentials
      echo ":rubygems_api_key: ${RUBYGEMS_API_KEY}" >> ~/.gem/credentials
      chmod 600 ~/.gem/credentials
      ls -1 *.gemspec
      gem build *.gemspec
      gem push llm_conductor-${GEM_VERSION}.gem
      echo "Successfully published llm_conductor-${GEM_VERSION} to RubyGems!"
      rm -f ~/.gem/credentials
  rules:
    - if: $CI_COMMIT_REF_NAME == "main"
